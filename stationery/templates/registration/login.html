{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>e-Stationery Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #dff3ff;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height:100vh;
        }

        .ioc-logo{
            position:absolute;
            top:20px;
            left:30px;
            height:80px;
        }

        .sprint-logo{
            position:absolute;
            top:20px;
            right:30px;
            height:90px;
        }

        .header{
            text-align:center;
            padding-top:30px;
            margin-bottom:40px;
        }

        .header h2{
            color:#003b8e;
            font-weight:bold;
        }

        .header h1{
            color:#003b8e;
            font-weight:bold;
        }

        .login-card{
            max-width:500px;
            margin:auto;
            background:#ffffffee;
            border-radius:15px;
            padding:30px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        .btn-login{
            background:#4da6ff;
            color:white;
            width:100%;
        }

    </style>

</head>

<body>



<div class="header">
    <h2>Rajasthan State Office</h2>
    <h1>e-Stationery Portal</h1>
</div>

<div class="login-card">

    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Login As</label>
            <select name="role" class="form-select" required>
                <option value="">Select Role</option>
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-login">
            Login
        </button>

    </form>

</div>

</body>
</html>
