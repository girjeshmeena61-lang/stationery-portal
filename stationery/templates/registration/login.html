```html
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Stationery Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-image: url("{% static 'images/sprint_bg.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            margin: 0;
        }

        .ioc-logo{
            position: absolute;
            top: 20px;
            left: 30px;
            height: 80px;
        }

        .sprint-logo{
            position: absolute;
            top: 20px;
            right: 30px;
            height: 90px;
        }

        .header{
            text-align: center;
            padding-top: 30px;
            margin-bottom: 40px;
        }

        .header h2{
            color: #003b8e;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .header h1{
            color: #003b8e;
            font-weight: bold;
        }

        .login-card{
            max-width: 500px;
            margin: auto;
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .card-title{
            text-align: center;
            color: #007bff;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .btn-login{
            background-color: #4da6ff;
            color: white;
            width: 100%;
            font-weight: bold;
        }

        .btn-login:hover{
            background-color: #3399ff;
            color: white;
        }

    </style>

</head>

<body>

    <img src="{% static 'images/iocl_logo.png' %}" class="ioc-logo">

    <img src="{% static 'images/sprint.gif' %}" class="sprint-logo">

    <div class="header">
        <h2>Rajasthan State Office</h2>
        <h1>e-Stationery Portal</h1>
    </div>

    <div class="login-card">

        <h4 class="card-title">
            Login
        </h4>

        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Login As</label>
                <select name="role" class="form-select" required>
                    <option value="">Select Role</option>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text"
                       name="username"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       required>
            </div>

            <button type="submit" class="btn btn-login">
                Login
            </button>

        </form>

    </div>

</body>
</html>
```
